name: phase-subsection-autopr

on:
  push:
    branches:
      - "phase*_work/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Derive base/head branches
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          head_branch="${GITHUB_REF_NAME}"
          base_branch="${head_branch%%/*}"

          if [[ "${head_branch}" == "${base_branch}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "${base_branch}" =~ ^phase[0-9]+_work$ ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          subsection="${head_branch#*/}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "head_branch=${head_branch}" >> "$GITHUB_OUTPUT"
          echo "base_branch=${base_branch}" >> "$GITHUB_OUTPUT"
          echo "subsection=${subsection}" >> "$GITHUB_OUTPUT"

      - name: Create PR if missing
        if: steps.vars.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ steps.vars.outputs.head_branch }}
          BASE_BRANCH: ${{ steps.vars.outputs.base_branch }}
          SUBSECTION: ${{ steps.vars.outputs.subsection }}
        shell: bash
        run: |
          set -euo pipefail
          existing_count="$(gh pr list --base "${BASE_BRANCH}" --head "${HEAD_BRANCH}" --state open --json number --jq 'length')"
          if [[ "${existing_count}" != "0" ]]; then
            echo "PR already exists for ${HEAD_BRANCH} -> ${BASE_BRANCH}"
            exit 0
          fi

          title="Auto PR: ${SUBSECTION} -> ${BASE_BRANCH}"
          body=$(
            cat <<EOF
Automated PR for subsection branch.

- Head branch: \`${HEAD_BRANCH}\`
- Base branch: \`${BASE_BRANCH}\`
- Subsection branch key: \`${SUBSECTION}\`

Opened automatically by \`.github/workflows/phase-subsection-autopr.yml\`.
EOF
          )

          gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${HEAD_BRANCH}" \
            --title "${title}" \
            --body "${body}"
