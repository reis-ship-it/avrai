name: phase-subsection-autopr

on:
  push:
    branches:
      - "phase*_work/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive parent-aware base/head branches
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          head_branch="${GITHUB_REF_NAME}"

          if [[ "${head_branch}" != *"/"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          phase_root="${head_branch%%/*}"
          if [[ ! "${phase_root}" =~ ^phase[0-9]+_work$ ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_branch="${head_branch%/*}"
          if [[ "${base_branch}" == "${head_branch}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          phase_num="${phase_root#phase}"
          phase_num="${phase_num%_work}"
          phase_id="P${phase_num}"
          subsection="${head_branch#${phase_root}/}"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "head_branch=${head_branch}" >> "$GITHUB_OUTPUT"
          echo "base_branch=${base_branch}" >> "$GITHUB_OUTPUT"
          echo "phase_id=${phase_id}" >> "$GITHUB_OUTPUT"
          echo "subsection=${subsection}" >> "$GITHUB_OUTPUT"

      - name: Naming verification gate
        if: steps.vars.outputs.skip == 'false'
        env:
          BRANCH_NAME: ${{ steps.vars.outputs.head_branch }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify_phase_naming.sh \
            --phase "${{ steps.vars.outputs.phase_id }}" \
            --branch "${{ steps.vars.outputs.head_branch }}"

      - name: Create PR if missing
        if: steps.vars.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ steps.vars.outputs.head_branch }}
          BASE_BRANCH: ${{ steps.vars.outputs.base_branch }}
          SUBSECTION: ${{ steps.vars.outputs.subsection }}
        shell: bash
        run: |
          set -euo pipefail
          existing_count="$(gh pr list --base "${BASE_BRANCH}" --head "${HEAD_BRANCH}" --state open --json number --jq 'length')"
          if [[ "${existing_count}" != "0" ]]; then
            echo "PR already exists for ${HEAD_BRANCH} -> ${BASE_BRANCH}"
            exit 0
          fi

          title="Auto PR: ${SUBSECTION} -> ${BASE_BRANCH}"
          body=$(
            cat <<EOF_BODY
Automated PR for subsection branch.

- Head branch: \`${HEAD_BRANCH}\`
- Base branch: \`${BASE_BRANCH}\`
- Subsection key: \`${SUBSECTION}\`

Naming verification gate: \`scripts/verify_phase_naming.sh\`
Opened automatically by \`.github/workflows/phase-subsection-autopr.yml\`.
EOF_BODY
          )

          gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${HEAD_BRANCH}" \
            --title "${title}" \
            --body "${body}"
