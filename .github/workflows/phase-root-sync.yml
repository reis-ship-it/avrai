name: phase-root-sync

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase number (example: 1 for phase1_work)"
        required: true
        type: string
      push_branch:
        description: "Push updated phase branch back to origin"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync main into phase root
        shell: bash
        run: |
          set -euo pipefail
          phase_input="${{ inputs.phase }}"
          if [[ "${phase_input}" =~ ^[0-9]+$ ]]; then
            phase_id="P${phase_input}"
          else
            phase_id="${phase_input}"
          fi

          args=(--phase "${phase_id}")
          if [[ "${{ inputs.push_branch }}" == "true" ]]; then
            args+=(--push)
          fi

          scripts/phase_root_sync.sh "${args[@]}"
