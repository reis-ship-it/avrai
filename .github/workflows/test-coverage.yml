name: Test Coverage Report

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'apps/avrai_app/lib/**'
      - 'apps/avrai_app/test/**'
      - 'apps/admin_app/**'
      - 'engine/**'
      - 'runtime/**'
      - 'shared/**'
      - 'work/scripts/**'
      - 'work/tools/**'
      - '.github/workflows/test-coverage.yml'
  workflow_dispatch:

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get

    - name: Generate package model code
      run: |
        (cd shared/avrai_core && dart pub get && dart run build_runner build --delete-conflicting-outputs)
        (cd runtime/avrai_network && dart pub get && dart run build_runner build --delete-conflicting-outputs)
      
    - name: Run tests with coverage
      working-directory: apps/avrai_app
      run: |
        flutter test --coverage --exclude-tags=performance
        
    - name: Generate coverage report
      working-directory: apps/avrai_app
      run: |
        sudo apt-get update && sudo apt-get install -y lcov || true
        genhtml coverage/lcov.info -o coverage/html || echo "lcov not available, skipping HTML generation"
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: apps/avrai_app/coverage/lcov.info
        flags: unittests,widgets,integration
        name: codecov-avrai
        fail_ci_if_error: false
        
    - name: Check coverage thresholds
      working-directory: apps/avrai_app
      run: |
        if [ -f coverage/lcov.info ]; then
          TOTAL_LINES=$(grep -c "^SF:" coverage/lcov.info || echo "0")
          HIT_LINES=$(grep -c "^LH:" coverage/lcov.info || echo "0")
          
          if [ "$TOTAL_LINES" -gt 0 ]; then
            COVERAGE=$(echo "scale=2; ($HIT_LINES * 100) / $TOTAL_LINES" | bc)
            echo "Coverage: ${COVERAGE}%"
            
            CRITICAL_THRESHOLD=90
            HIGH_THRESHOLD=85
            MEDIUM_THRESHOLD=75
            
            if (( $(echo "$COVERAGE < $CRITICAL_THRESHOLD" | bc -l) )); then
              echo "Coverage below critical threshold ($CRITICAL_THRESHOLD%)"
            else
              echo "Coverage meets critical threshold"
            fi
          fi
        fi
        
    - name: Upload coverage report artifact
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report
        path: apps/avrai_app/coverage/
        retention-days: 30
        
    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        MINIMUM_GREEN: 75
        MINIMUM_ORANGE: 60
