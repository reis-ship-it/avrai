name: Engine Runtime Boundary Guard

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  engine-runtime-boundary:
    name: engine-runtime-boundary
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate engine/runtime boundary imports
        run: |
          python3 scripts/ci/check_engine_runtime_boundary.py

      - name: Validate 3-prong boundary imports
        run: |
          python3 scripts/ci/check_three_prong_boundaries.py

      - name: Validate runtime capability contracts
        run: |
          python3 scripts/ci/check_runtime_capability_contracts.py
