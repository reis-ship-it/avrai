name: Experiment Registry Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  experiment-registry-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate experiment registry coverage + naming
        run: |
          python3 scripts/validate_experiment_registry.py
