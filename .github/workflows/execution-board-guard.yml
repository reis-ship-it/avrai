name: Execution Board Guard

on:
  pull_request:
  workflow_dispatch:

jobs:
  execution-board-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate execution board sync and phase coverage
        run: |
          dart --version
          dart run work/tools/update_execution_board.dart --check
          python3 scripts/validate_execution_board_urk_quality.py
          dart run work/tools/update_three_prong_reviews.dart --check
          dart run work/tools/export_conviction_shadow_telemetry.dart --check
          python3 scripts/ml/check_promotion_eval_manifest.py --check
          python3 scripts/runtime/check_conviction_canary_rollout_config.py
          python3 scripts/runtime/check_conviction_canary_dry_run_fixture.py
          python3 scripts/runtime/generate_conviction_canary_rollback_drill_report.py --check
          python3 scripts/runtime/generate_research_replication_sla_report.py --check
          python3 scripts/runtime/generate_trust_ux_priority_flow_report.py --check
          python3 scripts/runtime/generate_self_healing_incident_routing_report.py --check
          python3 scripts/runtime/generate_lineage_transparency_priority_flow_report.py --check
          python3 scripts/runtime/check_master_plan_signoff_registry.py
          python3 scripts/runtime/generate_master_plan_completion_audit_package.py --check
          python3 scripts/runtime/generate_trigger_orchestration_persistence_report.py --check
          python3 scripts/runtime/generate_security_cryptographic_assurance_report.py --check
          python3 scripts/runtime/generate_controller_orchestrator_reliability_report.py --check
          python3 scripts/runtime/generate_federated_cohort_canary_shadow_report.py --check
          python3 scripts/runtime/generate_advisory_quarantine_rollback_report.py --check
          python3 scripts/runtime/generate_memory_reliability_gates_report.py --check
          python3 scripts/runtime/generate_state_encoder_consistency_freshness_report.py --check
          python3 scripts/runtime/generate_energy_function_safety_regression_report.py --check
          python3 scripts/runtime/generate_transition_predictor_drift_calibration_report.py --check
          python3 scripts/runtime/generate_planner_guardrail_rollback_hardening_report.py --check
          python3 scripts/runtime/generate_business_data_consent_governance_report.py --check
          python3 scripts/runtime/generate_integration_governance_contract_security_report.py --check
          python3 scripts/runtime/generate_split_pass_ci_guard_contract_hardening_report.py --check
          python3 scripts/runtime/generate_production_readiness_cleanup_report.py --check
          python3 scripts/runtime/generate_urk_stage_a_trigger_privacy_no_egress_report.py --check
          python3 scripts/runtime/generate_urk_stage_b_event_ops_shadow_runtime_report.py --check
          python3 scripts/runtime/generate_urk_stage_c_private_mesh_policy_conformance_report.py --check
          python3 scripts/runtime/generate_urk_stage_d_business_runtime_replication_report.py --check
          python3 scripts/runtime/generate_urk_stage_d_expert_runtime_replication_report.py --check
          python3 scripts/runtime/generate_urk_stage_e_cross_runtime_conformance_report.py --check
          python3 scripts/runtime/generate_urk_kernel_promotion_lifecycle_report.py --check
          python3 scripts/runtime/generate_urk_learning_update_governance_report.py --check
          python3 scripts/runtime/generate_urk_reality_world_state_coherence_report.py --check
          python3 scripts/runtime/generate_urk_reality_temporal_truth_report.py --check
          python3 scripts/runtime/generate_urk_self_learning_governance_report.py --check
          python3 scripts/runtime/generate_urk_self_healing_recovery_report.py --check
          python3 scripts/runtime/generate_urk_learning_healing_bridge_report.py --check
          python3 scripts/runtime/generate_urk_kernel_activation_engine_report.py --check
          python3 scripts/runtime/generate_urk_kernel_control_plane_report.py --check
          python3 scripts/runtime/generate_urk_runtime_activation_receipt_dispatch_report.py --check
          python3 scripts/runtime/check_urk_kernel_registry.py
          python3 scripts/runtime/generate_urk_kernel_catalog.py --check
          python3 scripts/ci/check_admin_desktop_only.py
          python3 scripts/ci/check_admin_ideal_architecture_alignment.py

      - name: Validate deferred rename governance
        run: |
          if [[ -f scripts/validate_rename_candidates.py ]]; then
            python3 scripts/validate_rename_candidates.py
          else
            echo "Skipping validate_rename_candidates.py (not present on this branch)."
          fi
          if [[ -f scripts/suggest_rename_candidates_inventory.py ]]; then
            python3 scripts/suggest_rename_candidates_inventory.py --fail-on-untracked
          else
            echo "Skipping suggest_rename_candidates_inventory.py (not present on this branch)."
          fi

      - name: Validate architecture placement mapping and spot registry
        run: |
          python3 scripts/generate_master_plan_file_mapping.py
          python3 scripts/generate_architecture_spots_registry.py
          python3 scripts/validate_architecture_placement.py
          git diff --exit-code \
            work/docs/plans/architecture/CODEBASE_MASTER_PLAN_MAPPING_2026-02-15.md \
            work/docs/plans/architecture/generated/codebase_master_plan_mapping_2026-02-15.csv \
            work/docs/plans/architecture/ARCHITECTURE_SPOTS_REGISTRY.csv
