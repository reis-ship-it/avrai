name: Consumer App CI/CD

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/consumer_app/**'
      - 'lib/main.dart'
      - 'lib/app.dart'
      - 'lib/apps/consumer_app/**'
      - 'lib/presentation/**'
      - 'lib/core/**'
      - 'lib/data/**'
      - 'lib/domain/**'
      - 'packages/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'melos.yaml'
      - '.github/workflows/consumer-app-ci-cd.yml'
  push:
    branches: [main]
    paths:
      - 'apps/consumer_app/**'
      - 'lib/main.dart'
      - 'lib/app.dart'
      - 'lib/apps/consumer_app/**'
      - 'lib/presentation/**'
      - 'lib/core/**'
      - 'lib/data/**'
      - 'lib/domain/**'
      - 'packages/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'melos.yaml'
      - '.github/workflows/consumer-app-ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: consumer-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Consumer Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/consumer_app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.6

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    name: Consumer Android Build
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: apps/consumer_app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.6

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: consumer-app-apk
          path: apps/consumer_app/build/app/outputs/flutter-apk/app-debug.apk

  build-web:
    name: Consumer Web Build
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: apps/consumer_app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.6

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: consumer-app-web
          path: apps/consumer_app/build/web
