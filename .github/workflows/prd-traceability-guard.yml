name: PRD Traceability Guard

on:
  pull_request:

jobs:
  traceability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate PRD and execution-board traceability tags
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 scripts/validate_pr_traceability.py --require-execution-id --allow-legacy-card
