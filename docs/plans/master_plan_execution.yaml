orchestration_policies:
  branch_strategy:
    protected_branches:
      - main
    phase_branch_pattern: "phase/<id>"
    story_branch_pattern: "story/MPA-P<phase>-E<epic>-S<story>"
    auto_delete_story_branches: true
  merge_policy:
    story_pr_auto_merge: true
    required_checks:
      - master-plan-orchestration-validate
      - quick-tests
    disallow_auto_merge_labels:
      - security
      - migration
  failure_policy:
    transient_retry_attempts: 2
    stop_on_gate_failure: true
    create_failure_issue: true
    checkpoint_tag_pattern: "phase-<id>-checkpoint-<n>"
