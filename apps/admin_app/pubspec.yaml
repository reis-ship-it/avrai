name: avrai_admin_app
description: "AVRAI Admin standalone app shell (desktop-only: macOS/windows/linux)"
publish_to: "none"
version: 0.5.0-beta+1

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  avrai_core:
    path: ../../shared/avrai_core
  avrai_network:
    path: ../../runtime/avrai_network
  avrai_runtime_os:
    path: ../../runtime/avrai_runtime_os
  connectivity_plus: ^7.0.0
  fl_chart: ^1.1.1
  firebase_core: ^4.3.0
  flutter_bloc: ^9.1.1
  flutter_inappwebview: ^6.0.0
  flutter_secure_storage_x: ^12.1.4
  get_it: ^9.2.0
  go_router: ^17.0.1
  google_maps_flutter: ^2.5.0
  http: ^1.4.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  supabase_flutter: ^2.3.4
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.1
  get_storage: ^2.1.1
  mocktail: ^1.0.3
  mockito: ^5.6.3

flutter:
  uses-material-design: true
