<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Admin Agent Globe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #0f1c2f 0%, #03060b 65%);
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="container"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three.module.js",
      "three/addons/": "./lib/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x02050a, 6, 22);

    const camera = new THREE.PerspectiveCamera(
      52,
      window.innerWidth / window.innerHeight,
      0.1,
      100,
    );
    camera.position.set(0, 1.8, 5.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 3.2;
    controls.maxDistance = 10;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0x88aadd, 0.55);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xaad7ff, 1.1);
    keyLight.position.set(4, 3, 5);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0x4d7bb8, 0.7);
    rimLight.position.set(-5, -1, -3);
    scene.add(rimLight);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const globeRadius = 1.75;
    const globeGeo = new THREE.SphereGeometry(globeRadius, 64, 64);
    const globeMat = new THREE.MeshStandardMaterial({
      color: 0x1d4f82,
      roughness: 0.86,
      metalness: 0.06,
      transparent: true,
      opacity: 0.93,
    });
    const globeMesh = new THREE.Mesh(globeGeo, globeMat);
    globeGroup.add(globeMesh);

    const wire = new THREE.Mesh(
      new THREE.SphereGeometry(globeRadius + 0.003, 48, 48),
      new THREE.MeshBasicMaterial({
        color: 0x7ec5ff,
        wireframe: true,
        transparent: true,
        opacity: 0.18,
      }),
    );
    globeGroup.add(wire);

    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(globeRadius + 0.08, 48, 48),
      new THREE.MeshBasicMaterial({
        color: 0x6eaef7,
        transparent: true,
        opacity: 0.08,
      }),
    );
    globeGroup.add(atmosphere);

    const markerGroup = new THREE.Group();
    scene.add(markerGroup);
    const connectionGroup = new THREE.Group();
    scene.add(connectionGroup);
    const agentPositionById = new Map();
    const temporalState = {
      state: 'Alignment Window',
      progress: 0,
      states: [],
    };

    const stateColors = {
      'Alignment Window': 0x88d9ff,
      'Expansion Window': 0x73ffc8,
      'Stabilization Window': 0xffcf7a,
      'Reflection Window': 0xd0b0ff,
    };

    function activeTemporalColor() {
      return stateColors[temporalState.state] || 0x88d9ff;
    }

    function latLngToVector3(lat, lng, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lng + 180) * (Math.PI / 180);
      const x = -(radius * Math.sin(phi) * Math.cos(theta));
      const y = radius * Math.cos(phi);
      const z = radius * Math.sin(phi) * Math.sin(theta);
      return new THREE.Vector3(x, y, z);
    }

    function clearMarkers() {
      agentPositionById.clear();
      while (markerGroup.children.length > 0) {
        const child = markerGroup.children[0];
        markerGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
    }

    function clearConnections() {
      while (connectionGroup.children.length > 0) {
        const child = connectionGroup.children[0];
        connectionGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
    }

    function setAgents(agents) {
      clearMarkers();
      if (!Array.isArray(agents)) return;

      const temporalColor = activeTemporalColor();

      for (const agent of agents) {
        const lat = Number(agent.lat || 0);
        const lng = Number(agent.lng || 0);
        const isOnline = Boolean(agent.isOnline);
        const markerPos = latLngToVector3(lat, lng, globeRadius + 0.06);

        const color = isOnline ? temporalColor : 0xffaf5d;
        const marker = new THREE.Mesh(
          new THREE.SphereGeometry(0.035, 10, 10),
          new THREE.MeshStandardMaterial({
            color,
            emissive: color,
            emissiveIntensity: 0.25,
            roughness: 0.3,
            metalness: 0.1,
          }),
        );
        marker.position.copy(markerPos);
        marker.userData = {
          id: String(agent.agentId || 'agent'),
          isOnline,
        };
        agentPositionById.set(String(agent.agentId || 'agent'), markerPos.clone());
        markerGroup.add(marker);

        const anchor = latLngToVector3(lat, lng, globeRadius);
        const lineGeo = new THREE.BufferGeometry().setFromPoints([anchor, markerPos]);
        const line = new THREE.Line(
          lineGeo,
          new THREE.LineBasicMaterial({
            color,
            transparent: true,
            opacity: 0.35,
          }),
        );
        markerGroup.add(line);
      }
    }

    function setConnections(links) {
      clearConnections();
      if (!Array.isArray(links)) return;

      const temporalColor = activeTemporalColor();
      for (const link of links) {
        const from = String(link.from || '');
        const to = String(link.to || '');
        if (!from || !to || from === to) continue;

        const fromPos = agentPositionById.get(from);
        const toPos = agentPositionById.get(to);
        if (!fromPos || !toPos) continue;

        const strength = Math.max(0.08, Math.min(1.0, Number(link.strength || 0.3)));
        const mid = fromPos.clone().add(toPos).multiplyScalar(0.5).normalize().multiplyScalar(globeRadius + 0.5);
        const curve = new THREE.QuadraticBezierCurve3(fromPos, mid, toPos);
        const points = curve.getPoints(26);
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({
          color: temporalColor,
          transparent: true,
          opacity: 0.12 + (strength * 0.38),
        });
        const arc = new THREE.Line(geometry, material);
        arc.userData = {
          baseOpacity: material.opacity,
          strength,
        };
        connectionGroup.add(arc);
      }
    }

    function setTemporalState(payload) {
      if (!payload || typeof payload !== 'object') return;
      temporalState.state = String(payload.state || temporalState.state);
      temporalState.progress = Math.max(0, Math.min(1, Number(payload.progress || 0)));
      temporalState.states = Array.isArray(payload.states) ? payload.states : temporalState.states;

      const temporalColor = activeTemporalColor();
      wire.material.color.setHex(temporalColor);
      atmosphere.material.color.setHex(temporalColor);
      atmosphere.material.opacity = 0.06 + temporalState.progress * 0.1;

      for (const child of connectionGroup.children) {
        if (!child.material) continue;
        const baseOpacity = Number(child.userData?.baseOpacity || 0.2);
        child.material.color.setHex(temporalColor);
        child.material.opacity = baseOpacity * (0.75 + temporalState.progress * 0.4);
      }

      for (const child of markerGroup.children) {
        if (!child.material || child.type !== 'Mesh') continue;
        const isOnline = Boolean(child.userData?.isOnline);
        if (!isOnline) continue;
        child.material.color.setHex(temporalColor);
        child.material.emissive.setHex(temporalColor);
      }
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function notifyObjectTap(agentId) {
      if (window.flutter_inappwebview) {
        window.flutter_inappwebview.callHandler('onObjectTapped', agentId);
      }
    }

    renderer.domElement.addEventListener('pointerdown', event => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(markerGroup.children, true);
      if (hits.length > 0) {
        const hit = hits.find(h => h.object && h.object.userData && h.object.userData.id);
        if (hit) {
          notifyObjectTap(hit.object.userData.id);
        }
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      const phaseWave = Math.sin((performance.now() * 0.002) + (temporalState.progress * Math.PI * 2));
      globeGroup.rotation.y += 0.0014 + (temporalState.progress * 0.0023);
      globeMesh.material.emissiveIntensity = 0.05 + (phaseWave + 1) * 0.03;
      for (const child of connectionGroup.children) {
        if (!child.material) continue;
        const baseOpacity = Number(child.userData?.baseOpacity || 0.2);
        child.material.opacity = baseOpacity * (0.8 + (phaseWave + 1) * 0.18);
      }
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.globeRenderer = {
      setAgents,
      setConnections,
      setTemporalState,
    };

    window.cameraController = {
      reset: () => {
        camera.position.set(0, 1.8, 5.8);
        controls.target.set(0, 0, 0);
        controls.update();
      },
    };

    window.cleanup = () => {
      clearMarkers();
      clearConnections();
    };

    if (window.flutter_inappwebview) {
      window.flutter_inappwebview.callHandler('onReady', 'admin_agent_globe');
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
